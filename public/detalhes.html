<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhes da Notícia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="reporter.jpg" alt="Puc News Logo" class="logo">
        <span>Puc News</span>
      </a>
      <a href="index.html" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left"></i> Voltar para Home
      </a>
    </div>
  </nav>

  <div class="container mt-4">
    <article class="news-detail">
      <h1 id="titulo" class="mb-4"></h1>
      <div class="news-meta mb-4">
        <span id="data" class="me-3"><i class="bi bi-calendar3"></i></span>
        <span id="autor" class="me-3"><i class="bi bi-person"></i></span>
        <span id="categoria" class="me-3"><i class="bi bi-tag"></i></span>
        <span id="visualizacoes"><i class="bi bi-eye"></i></span>
      </div>
      <img id="imagem" alt="Imagem da notícia" class="img-fluid mb-4">
      <div id="conteudo" class="news-content"></div>
    </article>
  </div>

  <footer class="footer mt-5">
    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <h4>Sobre Nós</h4>
          <p>Puc News - Seu portal de notícias confiável e atualizado.</p>
        </div>
        <div class="col-md-4">
          <h4>Contato</h4>
          <p>Email: contato@pucnews.com</p>
          <p>Telefone: (11) 1234-5678</p>
        </div>
        <div class="col-md-4">
          <h4>Redes Sociais</h4>
          <div class="social-links">
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-twitter"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2025 Puc News. Todos os direitos reservados.</p>
        <p>Desenvolvido por Cauã Moreira Martins - Matrícula: 00878733</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    console.log('Página de detalhes carregada');
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM completamente carregado');
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
